<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Charlie’s Services</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <div>
      <h1>Service Overview</h1>
      <p class="subtitle">Everything I’m building, in one place.</p>
      <p class="author">Charlie Cheng</p>
    </div>
    <button id="themeToggle" class="theme-toggle" title="Toggle theme">
      <span class="icon">◐</span>
    </button>
  </div>
  <a href="https://home.charlie-cheng.cc" class="home-card" target="_blank">
    <div class="title">🏠 My Homepage</div>
    <div class="desc">Visit my main website</div>
    <div class="meta">
      <span>home.charlie-cheng.cc</span>
    </div>
  </a>
  <div class="grid" id="grid"></div>
  <div class="section-title" id="tools-title" style="display:none">Tools</div>
  <div class="grid" id="tools-grid"></div>
  <div class="section-title" id="local-title" style="display:none">Local Tools</div>
  <div class="grid" id="local-grid"></div>

<script>
async function check(url) {
  const controller = new AbortController()
  setTimeout(() => controller.abort(), 4000)

  const start = performance.now()
  try {
    await fetch(url, {
      method: "GET",
      mode: "no-cors",
      signal: controller.signal,
      cache: "no-store"
    })

    return {
      status: "UP",
      latency: Math.round(performance.now() - start)
    }
  } catch {
    return { status: "DOWN", latency: null }
  }
}

function buildCard(s, r) {
  const domain = new URL(s.url).hostname
  const card = document.createElement("div")
  card.className = "card"
  card.onclick = () => window.open(s.url, "_blank")
  card.innerHTML = `
    <div class="card-header">
      <div class="title">
        ${r.status === "UP" ? "🟢" : "🔴"}
        ${s.name}
      </div>
      ${s.status === "dev" ? '<span class="dev-badge">開發中</span>' : ''}
    </div>
    <div class="desc">${s.desc}</div>
    <div class="meta">
      <span>
        ${r.status === "UP" ? `⚡ ${r.latency}ms` : "⚠️ Unavailable!"}
      </span>
      <span class="domain">${domain}</span>
    </div>
  `
  return card
}

function buildLocalCard(s) {
  const card = document.createElement("div")
  card.className = "card local-card"
  card.innerHTML = `
    <div class="card-header">
      <div class="title">🛠️ ${s.name}</div>
    </div>
    <div class="desc">${s.desc}</div>
    <div class="meta">
      <span class="local-badge">Local</span>
    </div>
  `
  return card
}

async function init() {
  const res = await fetch("services.json")
  const services = await res.json()
  const grid = document.getElementById("grid")
  const toolsGrid = document.getElementById("tools-grid")
  const toolsTitle = document.getElementById("tools-title")
  const localGrid = document.getElementById("local-grid")
  const localTitle = document.getElementById("local-title")

  const tools = services.filter(s => s.type === "tool")
  const locals = services.filter(s => s.type === "local")
  const projects = services.filter(s => s.type !== "tool" && s.type !== "local")

  for (const s of projects) {
    const r = await check(s.url)
    grid.appendChild(buildCard(s, r))
  }

  if (tools.length > 0) {
    toolsTitle.style.display = ""
    for (const s of tools) {
      const r = await check(s.url)
      toolsGrid.appendChild(buildCard(s, r))
    }
  }

  if (locals.length > 0) {
    localTitle.style.display = ""
    for (const s of locals) {
      localGrid.appendChild(buildLocalCard(s))
    }
  }
}

// Dark/Light mode toggle
const toggle = document.getElementById("themeToggle")
const theme = localStorage.getItem("theme") || "light"
document.body.setAttribute("data-theme", theme)

toggle.onclick = () => {
  const current = document.body.getAttribute("data-theme")
  const next = current === "light" ? "dark" : "light"
  document.body.setAttribute("data-theme", next)
  localStorage.setItem("theme", next)
}

init()
</script>
</body>
</html>
